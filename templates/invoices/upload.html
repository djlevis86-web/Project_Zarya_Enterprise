{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-8">

        <div class="card shadow-sm">

            <div class="card-header bg-dark text-white">

                <h4 class="mb-0">

                    Upload Invoice

                </h4>

            </div>

            <div class="card-body">

                <form method="post"
                      enctype="multipart/form-data">

                    {% csrf_token %}

                    <div class="mb-3">

                        <label class="form-label">

                            Title

                        </label>

                        {{ form.title }}

                    </div>

                    <div class="mb-3">

                        <label class="form-label">

                            Description

                        </label>

                        {{ form.description }}

                    </div>

                    <div class="mb-3">

                        <label class="form-label">

                            Amount

                        </label>

                        {{ form.amount }}

                    </div>

                    <div class="mb-4">

                        <label class="form-label">

                            File

                        </label>

                        {{ form.file }}

                    </div>

                    <button class="btn btn-primary">

                        Upload & Process OCR

                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
