{% load static %}

<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="{% static 'css/style.css' %}">

</head>

<body>

<div class="container">

    <div class="row justify-content-center align-items-center"
         style="min-height: 100vh;">

        <div class="col-md-4">

            <div class="card p-4 shadow-lg">

                <h2 class="mb-4 text-center">
                    Project Zarya
                </h2>

                <form method="post">

                    {% csrf_token %}

                    <div class="mb-3">

                        <label>
                            Username
                        </label>

                        {{ form.username }}

                    </div>

                    <div class="mb-4">

                        <label>
                            Password
                        </label>

                        {{ form.password }}

                    </div>

                    <button class="btn btn-primary w-100">

                        Login

                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

</body>

</html>
